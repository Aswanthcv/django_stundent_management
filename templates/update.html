{% extends 'index.html' %}
{% block content %}

<div class="update-card">

    <h2>✏️ Update Student</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input
                type="text"
                name="name"
                value="{{ student.name }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input
                type="email"
                name="email"
                value="{{ student.email }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Course</label>
            <input
                type="text"
                name="course"
                value="{{ student.course }}"
                class="form-control"
                required>
        </div>

        <button type="submit" class="btn btn-success btn-update">
            Update Student
        </button>

        <a href="{% url 'home' %}" class="btn btn-secondary btn-back">
            Back to Dashboard
        </a>

    </form>

</div>

{% endblock %}
